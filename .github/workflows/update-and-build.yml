name: Update Project and Build AAB

on:
  workflow_dispatch:
  push:
    paths:
      - "WorldCupFan2026.zip"

permissions:
  contents: write

jobs:
  update-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace project from ZIP
        run: |
          rm -rf WorldCupFan2026
          unzip -o WorldCupFan2026.zip -d .
          rm -f WorldCupFan2026.zip

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build AAB
        run: |
          cd WorldCupFan2026
          gradle clean bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: WorldCupFan2026-AAB
          path: WorldCupFan2026/app/build/outputs/bundle/release/*.aab
