name: Update Project and Build AAB

on:
  workflow_dispatch:
  push:
    paths:
      - "WorldCupFan2026.zip"

permissions:
  contents: write

jobs:
  update-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace project from ZIP
        run: |
          rm -rf WorldCupFan2026
          unzip -o WorldCupFan2026.zip -d .
          rm -f WorldCupFan2026.zip

      - name: Commit extracted project
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Replace project from ZIP" || echo "No changes to commit"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AAB
        run: |
          cd WorldCupFan2026
          chmod +x gradlew
          ./gradlew clean bundleRelease

      - name: Find AAB
        run: |
          find WorldCupFan2026 -name "*.aab"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: WorldCupFan2026-AAB
          path: WorldCupFan2026/app/build/outputs/bundle/release/*.aab

      - name: Push extracted project
        run: |
          git push
