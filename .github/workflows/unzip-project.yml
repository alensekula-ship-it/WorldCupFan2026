name: Unzip Project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip WorldCupFan2026.zip
        run: |
          unzip -o WorldCupFan2026.zip -d .
          rm WorldCupFan2026.zip

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Extract WorldCupFan2026 project" || echo "No changes to commit"
          git push
