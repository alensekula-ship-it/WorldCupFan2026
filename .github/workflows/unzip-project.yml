name: Unzip Project

on:
  workflow_dispatch:
  push:
    paths:
      - "WorldCupFan2026.zip"

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove old project folder
        run: |
          rm -rf WorldCupFan2026

      - name: Unzip new project
        run: |
          unzip -o WorldCupFan2026.zip -d .
          rm -f WorldCupFan2026.zip

      - name: Commit extracted project
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Replace project from ZIP" || echo "No changes to commit"
          git push
